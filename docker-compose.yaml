services:

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SHEET_DATA_DIR: /ai_data/sheet_data
    volumes:
      - ./ai/data:/ai_data

  watcher:
    build: .
    container_name: imap_watcher
    command: python imap_watcher.py
    env_file:
      - .env
    depends_on:
      - app
